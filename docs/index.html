<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>早安图 - 一键触发</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .icon { font-size: 60px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 12px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status.success { background: #d4edda; color: #155724; display: block; }
    .status.error { background: #f8d7da; color: #721c24; display: block; }
    .status.loading { background: #fff3cd; color: #856404; display: block; }
    .token-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      display: none;
    }
    .token-input.show { display: block; }
    .hint { font-size: 12px; color: #aaa; margin-top: 20px; line-height: 1.6; }
    .repo-link { color: #667eea; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌅</div>
    <h1>早安图触发器</h1>
    <p class="subtitle">原力云禾 · 每日早安图</p>

    <input type="password" id="tokenInput" class="token-input" placeholder="首次使用需输入 GitHub Token">

    <button id="triggerBtn" class="btn btn-primary">🔄 重新生成早安图</button>
    <button id="clearBtn" class="btn btn-secondary">清除保存的 Token</button>

    <div id="status" class="status"></div>

    <p class="hint">
      点击按钮后会触发云端重新生成早安图<br>
      约 40 秒后新图会自动发到企业微信群<br><br>
      <a class="repo-link" href="https://github.com/2013100065-crypto/morning-poster/actions" target="_blank">查看运行记录 →</a>
    </p>
  </div>

  <script>
    const REPO = '2013100065-crypto/morning-poster';
    const WORKFLOW = 'generate.yml';
    const TOKEN_KEY = 'gh_token_morning';

    const tokenInput = document.getElementById('tokenInput');
    const triggerBtn = document.getElementById('triggerBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusDiv = document.getElementById('status');

    // 检查是否有保存的 token
    const savedToken = localStorage.getItem(TOKEN_KEY);
    if (!savedToken) {
      tokenInput.classList.add('show');
    }

    function showStatus(msg, type) {
      statusDiv.textContent = msg;
      statusDiv.className = 'status ' + type;
    }

    triggerBtn.addEventListener('click', async () => {
      let token = localStorage.getItem(TOKEN_KEY) || tokenInput.value.trim();

      if (!token) {
        tokenInput.classList.add('show');
        showStatus('请先输入 GitHub Personal Access Token', 'error');
        tokenInput.focus();
        return;
      }

      // 保存 token
      localStorage.setItem(TOKEN_KEY, token);
      tokenInput.classList.remove('show');

      showStatus('正在触发云端任务，请稍候...', 'loading');
      triggerBtn.disabled = true;

      try {
        const resp = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`, {
          method: 'POST',
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ ref: 'main' })
        });

        if (resp.status === 204) {
          showStatus('✅ 触发成功！约 40 秒后新图会发到企业微信群', 'success');
        } else if (resp.status === 401) {
          showStatus('❌ Token 无效或过期，请重新输入', 'error');
          localStorage.removeItem(TOKEN_KEY);
          tokenInput.classList.add('show');
        } else if (resp.status === 403) {
          showStatus('❌ Token 权限不足，需要勾选 workflow 权限', 'error');
        } else {
          const data = await resp.json().catch(() => ({}));
          showStatus('❌ 触发失败: ' + (data.message || resp.status), 'error');
        }
      } catch (e) {
        showStatus('❌ 网络错误，请检查网络连接', 'error');
      }

      triggerBtn.disabled = false;
    });

    clearBtn.addEventListener('click', () => {
      localStorage.removeItem(TOKEN_KEY);
      tokenInput.value = '';
      tokenInput.classList.add('show');
      showStatus('Token 已清除', 'success');
    });
  </script>
</body>
</html>
