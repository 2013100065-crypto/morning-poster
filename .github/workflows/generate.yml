name: 生成早安图

on:
  schedule:
    # UTC 10:00 = 北京时间 18:00
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 缓存字体文件
      id: cache-fonts
      uses: actions/cache@v4
      with:
        path: assets/fonts/
        key: fonts-v1

    - name: 下载字体（缓存未命中时）
      if: steps.cache-fonts.outputs.cache-hit != 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p assets/fonts
        gh release download fonts --repo ${{ github.repository }} --dir /tmp/fonts_download --clobber
        unzip -o /tmp/fonts_download/morning-poster-fonts.zip -d assets/fonts/
        ls -lh assets/fonts/

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 生成早安图
      env:
        WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
        UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      run: python generate.py

    - name: 提交变更（语录库 + 生成图片）
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/quotes.json output/
        git diff --quiet && git diff --staged --quiet || (git commit -m "每日早安图 $(date -u '+%Y-%m-%d')" && git push)
